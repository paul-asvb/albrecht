apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: zitadel
  namespace: flux-system
spec:
  dependsOn:
    - name: cert-manager-config
    - name: knative-serving
    - name: zitadel-postgres
  interval: 10m
  timeout: 15m
  retryInterval: 2m
  path: ./infrastructure/zitadel
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
