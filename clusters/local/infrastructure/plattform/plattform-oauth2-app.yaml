apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: plattform-oauth2-app
  namespace: flux-system
spec:
  dependsOn:
    - name: zitadel
  interval: 10m
  timeout: 10m
  retryInterval: 2m
  path: ./infrastructure/plattform-oauth2-app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
