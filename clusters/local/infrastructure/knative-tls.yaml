apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: knative-tls
  namespace: flux-system
spec:
  dependsOn:
    - name: cert-manager
    - name: knative-serving
  interval: 10m
  timeout: 10m
  retryInterval: 2m
  path: ./infrastructure/knative-tls
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
