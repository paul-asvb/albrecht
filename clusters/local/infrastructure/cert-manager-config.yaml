apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-config
  namespace: flux-system
spec:
  dependsOn:
    - name: cert-manager
  interval: 10m
  timeout: 5m
  retryInterval: 2m
  path: ./infrastructure/cert-manager-config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
