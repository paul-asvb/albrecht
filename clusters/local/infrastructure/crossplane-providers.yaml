apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crossplane-providers
  namespace: flux-system
spec:
  dependsOn:
    - name: crossplane
  interval: 10m
  timeout: 5m
  retryInterval: 2m
  path: ./infrastructure/crossplane-providers
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
