apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: zitadel-mock-users
  namespace: flux-system
spec:
  dependsOn:
    - name: plattform-oauth2-app
  interval: 10m
  timeout: 15m
  retryInterval: 2m
  path: ./infrastructure/zitadel-mock-users
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
