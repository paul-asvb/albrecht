apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: registry
  namespace: flux-system
spec:
  dependsOn:
    - name: cert-manager-config
    - name: knative-serving
  interval: 10m
  timeout: 5m
  retryInterval: 2m
  path: ./infrastructure/registry
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
