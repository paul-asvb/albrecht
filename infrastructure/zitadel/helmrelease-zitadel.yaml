apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zitadel
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: zitadel
      version: "=10.0.0"
      sourceRef:
        kind: HelmRepository
        name: zitadel
        namespace: flux-system
  targetNamespace: zitadel
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 0
      remediateLastFailure: true
      strategy: uninstall
  values:
    zitadel:
      masterkey: "MasterkeyNeedsToHave32Characters"
      configmapConfig:
        FirstInstance:
          Org:
            Name: plattform
            # Human:
            #   UserName: "paul"
            #   Password: "SecurePassword123!"
            #   FirstName: "Paul"
            #   LastName: "Admin"
            #   Email: "admin@zitadel.example.com"
            #   PasswordChangeRequired: false
            Machine:
              Machine:
                Username: zitadel-admin-sa
                Name: Admin
              MachineKey:
                ExpirationDate: "2029-01-01T00:00:00Z"
                Type: 1
        ExternalDomain: auth.192.168.1.249.sslip.io
        ExternalPort: 443
        ExternalSecure: true
        TLS:
          Enabled: false
        Database:
          Postgres:
            Host: postgresql
            Port: 5432
            Database: zitadel
            MaxOpenConns: 20
            MaxIdleConns: 10
            ConnMaxLifetime: "30m"
            User:
              Username: zitadel
              SSL:
                Mode: disable
            Admin:
              Username: postgres
              SSL:
                Mode: disable
      secretConfig:
        Database:
          Postgres:
            User:
              Password: "zitadel123"
            Admin:
              Password: "postgres123"
    postgresql:
      enabled: false
    replicaCount: 1
