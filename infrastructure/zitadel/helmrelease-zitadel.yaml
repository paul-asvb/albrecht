apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zitadel
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: zitadel
      version: ">=7.0.0 <8.0.0"
      sourceRef:
        kind: HelmRepository
        name: zitadel
        namespace: flux-system
  targetNamespace: zitadel
  install:
    createNamespace: false
  values:
    zitadel:
      masterkey: "MasterkeyNeedsToHave32Characters"
      configmapConfig:
        ExternalDomain: auth.192.168.1.249.sslip.io
        ExternalPort: 443
        ExternalSecure: true
        TLS:
          Enabled: false
    postgresql:
      enabled: true
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8080
      protocol: http
