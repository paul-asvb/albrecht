apiVersion: v1
kind: ConfigMap
metadata:
  name: config-network
  namespace: knative-serving
data:
  ingress-class: kourier.ingress.networking.knative.dev
  external-domain-tls: "Enabled"
  namespace-wildcard-cert-selector: |
    matchExpressions:
    - key: kubernetes.io/metadata.name
      operator: In
      values:
      - default
