apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - serving-core.yaml
  - kourier.yaml
patches:
  - path: config-domain.yaml
    target:
      kind: ConfigMap
      name: config-domain
      namespace: knative-serving
  - path: config-network.yaml
    target:
      kind: ConfigMap
      name: config-network
      namespace: knative-serving
  - path: kourier-service-patch.yaml
    target:
      kind: Service
      name: kourier
      namespace: kourier-system
