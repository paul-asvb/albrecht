apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xcustomernamespaces.volamar.io
spec:
  group: volamar.io
  names:
    kind: XCustomerNamespace
    plural: xcustomernamespaces
  claimNames:
    kind: CustomerNamespace
    plural: customernamespaces
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                customer:
                  type: string
                  description: Customer identifier — becomes the namespace name
              required:
                - customer
            status:
              type: object
              properties:
                namespace:
                  type: string
                  description: Name of the provisioned namespace
