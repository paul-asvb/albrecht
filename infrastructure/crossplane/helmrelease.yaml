apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crossplane
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: crossplane
      version: ">=1.17.0 <2.0.0"
      sourceRef:
        kind: HelmRepository
        name: crossplane-stable
        namespace: flux-system
  targetNamespace: crossplane-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
