apiVersion: v1
kind: ServiceAccount
metadata:
  name: zitadel-init
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zitadel-init
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
    resourceNames: ["plattform-init-key", "oauth2-proxy"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zitadel-init
  namespace: default
subjects:
  - kind: ServiceAccount
    name: zitadel-init
    namespace: default
roleRef:
  kind: Role
  name: zitadel-init
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
metadata:
  name: plattform-init-key
  namespace: default
stringData:
  private.pem: |
    -----BEGIN PUBLIC KEY-----
    MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAuhTEqgGfoSiZ8pZEabgD
    gTJI/3JR2kyg7swre5RUVzjZeGSh0ldx5Zr0IEAQdVpVmlx2PJ4BVkWmlME/WmqI
    jXL5RA7ej9iRHmD61tBM1UpX071L38M8JSAYYjz/egEx4WdbnQiFrMcDCrq1P04n
    7Gri4vooxqJmXckP4ExXYATaCR69wjy4sz6j5F32gXptRMjsbtF6+l/wNUgvR7XI
    MKSAqqBOjklyqdaXN6csP3/8dlM0Z3coiVPm+ga92vNyHFaW1UtSmxdJq1iHY5yA
    /XWJg3+52Mlakxjvag5YqYOBLye4yyM61dK0Ej1so/oKgOMj8isD5Lu4IniXwRPL
    EQIDAQAB
