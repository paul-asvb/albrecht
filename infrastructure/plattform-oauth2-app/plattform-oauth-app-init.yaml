apiVersion: v1
kind: ServiceAccount
metadata:
  name: plattform-oauth-app-init
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: plattform-oauth-app-init
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "update", "patch"]
    resourceNames: ["oauth2-proxy"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: plattform-oauth-app-init
  namespace: default
subjects:
  - kind: ServiceAccount
    name: plattform-oauth-app-init
    namespace: default
roleRef:
  kind: Role
  name: plattform-oauth-app-init
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: plattform-oauth-app-init
  namespace: zitadel
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["zitadel-admin-sa-pat"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: plattform-oauth-app-init
  namespace: zitadel
subjects:
  - kind: ServiceAccount
    name: plattform-oauth-app-init
    namespace: default
roleRef:
  kind: Role
  name: plattform-oauth-app-init
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: plattform-oauth-app-init-script
  namespace: default
data:
  init.js: |
    #!/usr/bin/env node
    'use strict';

    process.env.NODE_TLS_REJECT_UNAUTHORIZED = '0';

    const fs = require('fs');
    const crypto = require('crypto');
    const https = require('https');

    const ZURL = 'https://auth.192.168.1.249.sslip.io';
    const NS = 'default';
    const K8S_API = `https://${process.env.KUBERNETES_SERVICE_HOST}:${process.env.KUBERNETES_SERVICE_PORT || 443}`;
    const SA_TOKEN = fs.readFileSync('/var/run/secrets/kubernetes.io/serviceaccount/token', 'utf8').trim();

    function request(url, { method = 'GET', headers = {}, body } = {}) {
      return new Promise((resolve, reject) => {
        const u = new URL(url);
        const req = https.request(
          { hostname: u.hostname, port: u.port || 443, path: u.pathname + u.search, method, headers },
          res => {
            const chunks = [];
            res.on('data', c => chunks.push(c));
            res.on('end', () => {
              const text = Buffer.concat(chunks).toString();
              try { resolve({ status: res.statusCode, data: JSON.parse(text) }); }
              catch { resolve({ status: res.statusCode, data: text }); }
            });
          }
        );
        req.on('error', reject);
        if (body) req.write(typeof body === 'string' ? body : JSON.stringify(body));
        req.end();
      });
    }

    function k8s(method, path, body) {
      return request(`${K8S_API}${path}`, {
        method,
        headers: { Authorization: `Bearer ${SA_TOKEN}`, 'Content-Type': 'application/json' },
        body,
      });
    }

    function zitadel(method, path, body, token) {
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers.Authorization = `Bearer ${token}`;
      return request(`${ZURL}${path}`, { method, headers, body });
    }

    async function findOrCreateProject(token, name) {
      const { data } = await zitadel('POST', '/management/v1/projects/_search', { query: { limit: 100 } }, token);
      const existing = (data.result || []).find(p => p.name === name);
      if (existing) { console.log(`Found project: ${existing.id}`); return existing.id; }
      const { data: created } = await zitadel('POST', '/management/v1/projects', { name }, token);
      if (!created.id) throw new Error(`Project creation failed: ${JSON.stringify(created)}`);
      console.log(`Created project: ${created.id}`);
      return created.id;
    }

    async function findOrCreateApp(token, projectId, name) {
      const { data } = await zitadel('POST', `/management/v1/projects/${projectId}/apps/_search`, { query: { limit: 100 } }, token);
      const existing = (data.result || []).find(a => a.name === name && a.oidcConfig);
      if (existing) {
        console.log(`App exists (${existing.id}), resetting client secret`);
        const { data: reset } = await zitadel('POST', `/management/v1/projects/${projectId}/apps/${existing.id}/oidc_config/_reset_client_secret`, {}, token);
        if (!reset.clientId) throw new Error(`Client secret reset failed: ${JSON.stringify(reset)}`);
        return { clientId: reset.clientId, clientSecret: reset.clientSecret };
      }
      const { data: created } = await zitadel('POST', `/management/v1/projects/${projectId}/apps/oidc`, {
        name,
        redirectUris: ['https://plattform.default.192.168.1.249.sslip.io/oauth2/callback'],
        responseTypes: ['OIDC_RESPONSE_TYPE_CODE'],
        grantTypes: ['OIDC_GRANT_TYPE_AUTHORIZATION_CODE', 'OIDC_GRANT_TYPE_REFRESH_TOKEN'],
        appType: 'OIDC_APP_TYPE_WEB',
        authMethodType: 'OIDC_AUTH_METHOD_TYPE_BASIC',
        postLogoutRedirectUris: ['https://plattform.default.192.168.1.249.sslip.io'],
        version: 'OIDC_VERSION_1_0',
        accessTokenType: 'OIDC_TOKEN_TYPE_BEARER',
      }, token);
      if (!created.clientId) throw new Error(`App creation failed: ${JSON.stringify(created)}`);
      console.log(`Created OIDC app: ${created.clientId}`);
      return { clientId: created.clientId, clientSecret: created.clientSecret };
    }

    async function applySecret(name, namespace, stringData) {
      const { status, data: existing } = await k8s('GET', `/api/v1/namespaces/${namespace}/secrets/${name}`);
      const secret = { apiVersion: 'v1', kind: 'Secret', metadata: { name, namespace }, stringData };
      let result;
      if (status === 404) {
        result = await k8s('POST', `/api/v1/namespaces/${namespace}/secrets`, secret);
      } else {
        secret.metadata.resourceVersion = existing.metadata.resourceVersion;
        result = await k8s('PUT', `/api/v1/namespaces/${namespace}/secrets/${name}`, secret);
      }
      if (result.status < 200 || result.status > 299) {
        throw new Error(`Failed to write secret ${name} (${result.status}): ${JSON.stringify(result.data)}`);
      }
    }

    async function main() {
      const { status, data: existing } = await k8s('GET', `/api/v1/namespaces/${NS}/secrets/oauth2-proxy`);
      if (status === 200 && existing?.data?.['client-id']) {
        console.log('oauth2-proxy secret already populated, nothing to do');
        return;
      }

      const { status: patStatus, data: patSecret } = await k8s('GET', '/api/v1/namespaces/zitadel/secrets/zitadel-admin-sa-pat');
      if (patStatus !== 200) throw new Error(`Failed to read PAT secret (${patStatus}): ${JSON.stringify(patSecret)}`);
      const token = Buffer.from(patSecret.data['pat'], 'base64').toString().trim();

      const projectId = await findOrCreateProject(token, 'plattform');
      const { clientId, clientSecret } = await findOrCreateApp(token, projectId, 'plattform');
      const cookieSecret = crypto.randomBytes(32).toString('base64');

      await applySecret('oauth2-proxy', NS, {
        'client-id': clientId,
        'client-secret': clientSecret,
        'cookie-secret': cookieSecret,
      });

      console.log('✓ oauth2-proxy secret written');
    }

    main().catch(err => { console.error(err.message || err); process.exit(1); });
---
apiVersion: batch/v1
kind: Job
metadata:
  name: plattform-oauth-app-init
  namespace: default
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: plattform-oauth-app-init
      restartPolicy: Never
      containers:
        - name: init
          image: node:20-alpine
          command: ["node", "/scripts/init.js"]
          volumeMounts:
            - name: script
              mountPath: /scripts
      volumes:
        - name: script
          configMap:
            name: plattform-oauth-app-init-script
            defaultMode: 0755
