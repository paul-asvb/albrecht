apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zitadel-postgresql
  namespace: zitadel
spec:
  serviceName: zitadel-postgresql-hl
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/instance: zitadel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/instance: zitadel
    spec:
      containers:
        - name: postgresql
          image: docker.io/library/postgres:15-alpine
          env:
            - name: POSTGRES_PASSWORD
              value: "postgres123"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgresql
              containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 8Gi
