apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgresql
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: postgresql
      version: ">=15.0.0 <16.0.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  targetNamespace: zitadel
  install:
    createNamespace: true
  values:
    auth:
      database: zitadel
      username: zitadel
      password: "zitadel123"
      postgresPassword: "postgres123"
    primary:
      persistence:
        enabled: true
        size: 1Gi
