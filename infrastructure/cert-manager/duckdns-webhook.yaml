---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cert-manager-webhook-duckdns
  namespace: cert-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cert-manager-webhook-duckdns:domain-solver
rules:
  - apiGroups: [acme.duckdns.org]
    resources: ["*"]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cert-manager-webhook-duckdns:auth-delegator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: cert-manager-webhook-duckdns
    namespace: cert-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cert-manager-webhook-duckdns:domain-solver
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cert-manager-webhook-duckdns:domain-solver
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: cert-manager
    namespace: cert-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-manager-webhook-duckdns:webhook-authentication-reader
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: cert-manager-webhook-duckdns
    namespace: cert-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cert-manager-webhook-duckdns:secret-reader
  namespace: cert-manager
rules:
  - apiGroups: [""]
    resources: [secrets]
    resourceNames: [duckdns-token]
    verbs: [get, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-manager-webhook-duckdns:secret-reader
  namespace: cert-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cert-manager-webhook-duckdns:secret-reader
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: cert-manager-webhook-duckdns
    namespace: cert-manager
---
# Self-signed issuer to bootstrap the webhook TLS chain
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: cert-manager-webhook-duckdns-selfsign
  namespace: cert-manager
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cert-manager-webhook-duckdns-ca
  namespace: cert-manager
spec:
  secretName: cert-manager-webhook-duckdns-ca
  duration: 43800h
  issuerRef:
    name: cert-manager-webhook-duckdns-selfsign
  commonName: "ca.cert-manager-webhook-duckdns.cert-manager"
  isCA: true
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: cert-manager-webhook-duckdns-ca
  namespace: cert-manager
spec:
  ca:
    secretName: cert-manager-webhook-duckdns-ca
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cert-manager-webhook-duckdns-webhook-tls
  namespace: cert-manager
spec:
  secretName: cert-manager-webhook-duckdns-webhook-tls
  duration: 8760h
  issuerRef:
    name: cert-manager-webhook-duckdns-ca
  dnsNames:
    - cert-manager-webhook-duckdns
    - cert-manager-webhook-duckdns.cert-manager
    - cert-manager-webhook-duckdns.cert-manager.svc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cert-manager-webhook-duckdns
  namespace: cert-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cert-manager-webhook-duckdns
  template:
    metadata:
      labels:
        app: cert-manager-webhook-duckdns
    spec:
      serviceAccountName: cert-manager-webhook-duckdns
      containers:
        - name: cert-manager-webhook-duckdns
          image: ebrianne/cert-manager-webhook-duckdns:v1.2.3
          imagePullPolicy: IfNotPresent
          args:
            - --tls-cert-file=/tls/tls.crt
            - --tls-private-key-file=/tls/tls.key
            - --v=2
          env:
            - name: GROUP_NAME
              value: "acme.duckdns.org"
          ports:
            - name: https
              containerPort: 443
              protocol: TCP
          livenessProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: https
          readinessProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: https
          volumeMounts:
            - name: certs
              mountPath: /tls
              readOnly: true
      volumes:
        - name: certs
          secret:
            secretName: cert-manager-webhook-duckdns-webhook-tls
---
apiVersion: v1
kind: Service
metadata:
  name: cert-manager-webhook-duckdns
  namespace: cert-manager
spec:
  type: ClusterIP
  ports:
    - port: 443
      targetPort: https
      protocol: TCP
      name: https
  selector:
    app: cert-manager-webhook-duckdns
---
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1alpha1.acme.duckdns.org
  annotations:
    cert-manager.io/inject-ca-from: "cert-manager/cert-manager-webhook-duckdns-webhook-tls"
spec:
  group: acme.duckdns.org
  groupPriorityMinimum: 1000
  versionPriority: 15
  service:
    name: cert-manager-webhook-duckdns
    namespace: cert-manager
  version: v1alpha1
