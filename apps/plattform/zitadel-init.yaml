apiVersion: v1
kind: ServiceAccount
metadata:
  name: zitadel-init
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zitadel-init
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zitadel-init
  namespace: default
subjects:
  - kind: ServiceAccount
    name: zitadel-init
    namespace: default
roleRef:
  kind: Role
  name: zitadel-init
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zitadel-init-script
  namespace: default
data:
  init.sh: |
    #!/bin/sh
    set -e

    ZURL="https://auth.192.168.1.249.sslip.io"
    NS="default"

    # Idempotency: skip if secret already has credentials
    if kubectl get secret oauth2-proxy -n "$NS" -o jsonpath='{.data.client-id}' 2>/dev/null \
        | base64 -d 2>/dev/null | grep -q .; then
      echo "oauth2-proxy secret already populated, nothing to do"
      exit 0
    fi

    # Authenticate as admin — try both org-domain formats Zitadel may use
    # Admin password is injected via ZITADEL_ADMIN_PASSWORD env var (from secret)
    SESSION=""
    SESSION_ID=""
    for LOGIN in \
      "zitadel-admin@auth.192.168.1.249.sslip.io" \
      "zitadel-admin@zitadel.auth.192.168.1.249.sslip.io"; do
      SESSION=$(curl -sk -X POST "$ZURL/v2/sessions" \
        -H "Content-Type: application/json" \
        -d "{\"checks\":{\"user\":{\"loginName\":\"$LOGIN\"},\"password\":{\"password\":\"$ZITADEL_ADMIN_PASSWORD\"}}}")
      SESSION_ID=$(echo "$SESSION" | jq -r '.sessionId // empty')
      if [ -n "$SESSION_ID" ]; then
        echo "Authenticated as $LOGIN"
        break
      fi
    done

    if [ -z "$SESSION_ID" ]; then
      echo "Authentication failed. Response: $SESSION"
      exit 1
    fi

    SESSION_TOKEN=$(echo "$SESSION" | jq -r '.sessionToken')

    # Exchange session for a Management API access token
    TOKEN=$(curl -sk -X POST "$ZURL/oauth/v2/token" \
      -H "Content-Type: application/x-www-form-urlencoded" \
      -d "grant_type=urn:ietf:params:oauth:grant-type:token-exchange\
    &client_id=zitadel\
    &subject_token=$SESSION_TOKEN\
    &subject_token_type=urn:ietf:params:oauth:token-type:session_token\
    &scope=openid+urn:zitadel:iam:org:project:id:zitadel:aud" | jq -r '.access_token // empty')

    if [ -z "$TOKEN" ]; then
      echo "Token exchange failed"
      exit 1
    fi
    echo "Got access token"

    AUTH="Authorization: Bearer $TOKEN"

    # Find or create project "plattform"
    PROJECT_ID=$(curl -sk -X POST "$ZURL/management/v1/projects/_search" \
      -H "$AUTH" -H "Content-Type: application/json" \
      -d '{"query":{"limit":100}}' \
      | jq -r '.result[]? | select(.name=="plattform") | .id' | head -1)

    if [ -z "$PROJECT_ID" ]; then
      PROJECT_ID=$(curl -sk -X POST "$ZURL/management/v1/projects" \
        -H "$AUTH" -H "Content-Type: application/json" \
        -d '{"name":"plattform"}' | jq -r '.id')
      echo "Created project: $PROJECT_ID"
    else
      echo "Found project: $PROJECT_ID"
    fi

    # Find or create OIDC app "plattform"
    APPS=$(curl -sk -X POST "$ZURL/management/v1/projects/$PROJECT_ID/apps/_search" \
      -H "$AUTH" -H "Content-Type: application/json" \
      -d '{"query":{"limit":100}}')
    APP_ID=$(echo "$APPS" | jq -r '.result[]? | select(.name=="plattform") | .id' | head -1)

    if [ -z "$APP_ID" ]; then
      CREATED=$(curl -sk -X POST "$ZURL/management/v1/projects/$PROJECT_ID/apps/oidc" \
        -H "$AUTH" -H "Content-Type: application/json" \
        -d '{
          "name":"plattform",
          "redirectUris":["https://plattform.default.192.168.1.249.sslip.io/oauth2/callback"],
          "responseTypes":["OIDC_RESPONSE_TYPE_CODE"],
          "grantTypes":["OIDC_GRANT_TYPE_AUTHORIZATION_CODE","OIDC_GRANT_TYPE_REFRESH_TOKEN"],
          "appType":"OIDC_APP_TYPE_WEB",
          "authMethodType":"OIDC_AUTH_METHOD_TYPE_BASIC",
          "postLogoutRedirectUris":["https://plattform.default.192.168.1.249.sslip.io"],
          "version":"OIDC_VERSION_1_0",
          "accessTokenType":"OIDC_TOKEN_TYPE_BEARER"
        }')
      CLIENT_ID=$(echo "$CREATED" | jq -r '.clientId // empty')
      CLIENT_SECRET=$(echo "$CREATED" | jq -r '.clientSecret // empty')
      if [ -z "$CLIENT_ID" ]; then
        echo "App creation failed: $CREATED"
        exit 1
      fi
      echo "Created OIDC app: $CLIENT_ID"
    else
      # App exists but oauth2-proxy secret is missing — reset the client secret
      echo "App exists ($APP_ID), resetting client secret"
      RESET=$(curl -sk -X POST \
        "$ZURL/management/v1/projects/$PROJECT_ID/apps/$APP_ID/oidc_config/_reset_client_secret" \
        -H "$AUTH" -H "Content-Type: application/json")
      CLIENT_ID=$(echo "$RESET" | jq -r '.clientId // empty')
      CLIENT_SECRET=$(echo "$RESET" | jq -r '.clientSecret // empty')
      if [ -z "$CLIENT_ID" ]; then
        echo "Client secret reset failed: $RESET"
        exit 1
      fi
    fi

    COOKIE_SECRET=$(dd if=/dev/urandom bs=32 count=1 2>/dev/null | base64 | tr -d '\n')

    kubectl create secret generic oauth2-proxy -n "$NS" \
      --from-literal=client-id="$CLIENT_ID" \
      --from-literal=client-secret="$CLIENT_SECRET" \
      --from-literal=cookie-secret="$COOKIE_SECRET" \
      --dry-run=client -o yaml | kubectl apply -f -

    echo "✓ oauth2-proxy secret written"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: zitadel-init
  namespace: default
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: zitadel-init
      restartPolicy: Never
      containers:
        - name: init
          image: alpine/k8s:1.30.4
          command: ["/bin/sh", "/scripts/init.sh"]
          env:
            - name: ZITADEL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zitadel-admin
                  key: password
          volumeMounts:
            - name: script
              mountPath: /scripts
      volumes:
        - name: script
          configMap:
            name: zitadel-init-script
            defaultMode: 0755
